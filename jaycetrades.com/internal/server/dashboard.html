<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>JayceTrades | Live Dashboard</title>
  <meta name="description" content="Live options trade dashboard showing today's AI-powered picks with real-time contract performance and P&L tracking.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://jaycetrades.com/dashboard">
  <meta property="og:title" content="JayceTrades | Live Dashboard">
  <meta property="og:description" content="Live options trade dashboard with real-time contract performance tracking.">
  <meta property="og:url" content="https://jaycetrades.com/dashboard">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light dark;
      --background: #fafafa;
      --foreground: #0f172a;
      --card: #ffffff;
      --card-foreground: #0f172a;
      --primary: #475569;
      --primary-foreground: #ffffff;
      --muted: #f1f5f9;
      --muted-foreground: #64748b;
      --accent: #94a3b8;
      --border: #e2e8f0;
      --input: #e2e8f0;
      --ring: #475569;
      --radius: 0.5rem;
      --green: #16a34a;
      --green-bg: #dcfce7;
      --green-light: #f0fdf4;
      --green-border: #bbf7d0;
      --red: #dc2626;
      --red-bg: #fee2e2;
      --red-light: #fef2f2;
      --red-border: #fecaca;
      --blue: #1d4ed8;
      --blue-bg: #dbeafe;
      --amber: #b45309;
      --amber-bg: #fef3c7;
      --purple: #7c3aed;
      --purple-bg: #ede9fe;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --background: #0f172a;
        --foreground: #f1f5f9;
        --card: #1e293b;
        --card-foreground: #f1f5f9;
        --primary: #94a3b8;
        --primary-foreground: #0f172a;
        --muted: #1e293b;
        --muted-foreground: #94a3b8;
        --accent: #cbd5e1;
        --border: #334155;
        --input: #334155;
        --ring: #94a3b8;
        --green-bg: rgba(22, 163, 74, 0.15);
        --green-light: rgba(22, 163, 74, 0.08);
        --green-border: rgba(22, 163, 74, 0.3);
        --red-bg: rgba(220, 38, 38, 0.15);
        --red-light: rgba(220, 38, 38, 0.08);
        --red-border: rgba(220, 38, 38, 0.3);
        --blue-bg: rgba(29, 78, 216, 0.15);
        --amber-bg: rgba(180, 83, 9, 0.15);
        --purple-bg: rgba(124, 58, 237, 0.15);
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      background-color: var(--background);
      color: var(--foreground);
      min-height: 100vh;
      padding: 24px 16px;
    }

    .page { max-width: 960px; margin: 0 auto; }

    .main-card {
      background-color: var(--card);
      color: var(--card-foreground);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px -1px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; text-decoration: none; }
    .logo-jayce { color: var(--foreground); }
    .logo-trades { color: var(--primary); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .nav-link {
      color: var(--muted-foreground); font-size: 13px; text-decoration: none;
      transition: color 0.15s;
    }
    .nav-link:hover { color: var(--foreground); }

    /* Date Navigation */
    .date-nav {
      display: flex; align-items: center; gap: 0;
      background: var(--muted); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
    }
    .date-nav-btn {
      background: none; border: none; cursor: pointer;
      padding: 6px 10px; color: var(--muted-foreground);
      font-size: 14px; font-weight: 600;
      transition: all 0.15s;
      display: flex; align-items: center;
    }
    .date-nav-btn:hover { color: var(--foreground); background: var(--border); }
    .date-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .date-nav-label {
      padding: 6px 14px; font-size: 13px; font-weight: 600;
      color: var(--foreground); white-space: nowrap;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      min-width: 130px; text-align: center;
    }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #4ade80;
      animation: pulse-dot 2s ease-in-out infinite; flex-shrink: 0;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); }
    }

    /* Content */
    .content { padding: 24px 28px; }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    @media (max-width: 640px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .stat-card {
      background: var(--muted); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      text-align: center;
    }
    .stat-value { font-size: 28px; font-weight: 800; line-height: 1.1; }
    .stat-label {
      font-size: 10px; color: var(--muted-foreground); text-transform: uppercase;
      letter-spacing: 0.5px; font-weight: 600; margin-top: 4px;
    }
    .stat-sub {
      font-size: 11px; color: var(--muted-foreground); margin-top: 2px;
    }

    /* Win Rate Bar */
    .win-bar-container {
      width: 100%; height: 6px; background: var(--red-bg);
      border-radius: 3px; margin-top: 8px; overflow: hidden;
    }
    .win-bar-fill {
      height: 100%; background: var(--green); border-radius: 3px;
      transition: width 0.5s ease;
    }

    /* Section Headers */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title { font-size: 16px; font-weight: 700; }
    .section-subtitle { font-size: 12px; color: var(--muted-foreground); }

    /* Divider */
    .divider {
      height: 1px; background: var(--border); margin: 24px 0;
    }

    /* Chart */
    .chart-container { margin-bottom: 8px; }
    .chart-row {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 0; border-bottom: 1px solid var(--border);
    }
    .chart-row:last-child { border-bottom: none; }
    .chart-label {
      width: 120px; flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
    }
    .chart-symbol { font-size: 14px; font-weight: 700; }
    .chart-type {
      font-size: 9px; font-weight: 700; padding: 2px 5px;
      border-radius: 3px; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .chart-type-call { background: var(--green-bg); color: var(--green); }
    .chart-type-put { background: var(--red-bg); color: var(--red); }
    .chart-bar-wrapper {
      flex: 1; height: 28px; background: var(--muted);
      border-radius: 4px; overflow: hidden; position: relative;
    }
    .chart-bar {
      height: 100%; border-radius: 4px;
      transition: width 0.5s ease;
      min-width: 2px;
    }
    .chart-bar-profit { background: var(--green); opacity: 0.65; }
    .chart-bar-loss { background: var(--red); opacity: 0.65; }
    .chart-pnl {
      width: 80px; text-align: right; font-size: 14px; font-weight: 700;
      flex-shrink: 0;
    }
    .chart-pnl-pct {
      font-size: 11px; font-weight: 600; margin-left: 4px;
    }
    .color-green { color: var(--green); }
    .color-red { color: var(--red); }
    .color-muted { color: var(--muted-foreground); }

    /* Trade Table */
    .trade-table { width: 100%; border-collapse: collapse; }
    .trade-table th {
      text-align: left; font-size: 10px; font-weight: 600;
      color: var(--muted-foreground); text-transform: uppercase;
      letter-spacing: 0.5px; padding: 8px 10px;
      border-bottom: 2px solid var(--border);
    }
    .trade-table th:last-child,
    .trade-table td:last-child { text-align: right; }
    .trade-table td {
      padding: 10px; font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .trade-table tr:last-child td { border-bottom: none; }
    .trade-table-symbol { font-weight: 700; font-size: 14px; }
    .trade-table-detail { color: var(--muted-foreground); font-size: 11px; }

    /* Badge */
    .badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 3px 8px; border-radius: 4px; text-transform: uppercase;
      letter-spacing: 0.5px; vertical-align: middle;
    }
    .badge-call { background: var(--green-bg); color: var(--green); }
    .badge-put { background: var(--red-bg); color: var(--red); }
    .badge-low { background: var(--blue-bg); color: var(--blue); }
    .badge-medium { background: var(--muted); color: var(--muted-foreground); border: 1px solid var(--border); }
    .badge-high { background: var(--amber-bg); color: var(--amber); }
    .badge-profit { background: var(--green-bg); color: var(--green); }
    .badge-loss { background: var(--red-bg); color: var(--red); }
    .badge-flat { background: var(--muted); color: var(--muted-foreground); border: 1px solid var(--border); }

    /* Expandable Trade Details */
    .trade-detail-row { display: none; }
    .trade-detail-row.open { display: table-row; }
    .trade-detail-cell {
      padding: 0 10px 12px 10px;
      background: var(--muted);
    }
    .trade-detail-inner {
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .detail-grid {
      display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 10px;
    }
    .detail-col { flex: 1; min-width: 120px; }
    .detail-label {
      font-size: 9px; color: var(--muted-foreground); text-transform: uppercase;
      letter-spacing: 0.5px; font-weight: 600;
    }
    .detail-value { font-size: 14px; font-weight: 700; margin-top: 2px; }
    .detail-value-sm { font-size: 13px; font-weight: 600; margin-top: 2px; }
    .detail-thesis {
      color: var(--muted-foreground); font-size: 13px; line-height: 1.5;
      margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);
    }
    .detail-eod {
      margin-top: 10px; padding: 12px;
      border-radius: calc(var(--radius) - 2px);
      border: 1px solid var(--border);
    }
    .detail-eod.profit { background: var(--green-light); border-color: var(--green-border); }
    .detail-eod.loss { background: var(--red-light); border-color: var(--red-border); }
    .detail-eod-notes {
      color: var(--muted-foreground); font-size: 12px; line-height: 1.5;
      margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border);
    }
    .clickable { cursor: pointer; }
    .clickable:hover { background: var(--muted); }
    .expand-icon {
      display: inline-block; transition: transform 0.2s;
      font-size: 10px; color: var(--accent); margin-right: 4px;
    }
    .expand-icon.open { transform: rotate(90deg); }

    /* Morning-only state */
    .morning-card {
      background: var(--muted); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 18px; margin-bottom: 12px;
    }
    .morning-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px; flex-wrap: wrap; gap: 8px;
    }
    .morning-symbol { font-size: 18px; font-weight: 800; }
    .morning-price { font-size: 16px; font-weight: 800; }
    .morning-specs {
      display: flex; gap: 16px; flex-wrap: wrap;
      font-size: 12px; color: var(--muted-foreground);
    }
    .morning-specs strong { color: var(--foreground); font-weight: 700; }
    .morning-thesis {
      color: var(--muted-foreground); font-size: 13px; line-height: 1.5;
      margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border);
    }

    /* Info Banner */
    .info-banner {
      background: var(--blue-bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px;
      margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
    }
    .info-banner-icon { font-size: 16px; flex-shrink: 0; }
    .info-banner-text { font-size: 13px; color: var(--foreground); }

    /* Footer */
    .footer {
      padding: 20px 28px;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .footer-text { color: var(--muted-foreground); font-size: 11px; line-height: 1.5; }
    .footer-brand { margin-top: 8px; }
    .footer-brand .logo { font-size: 14px; }
    .footer-links { margin-top: 8px; }
    .footer-links a {
      color: var(--muted-foreground); font-size: 12px; text-decoration: underline;
      text-underline-offset: 2px; transition: color 0.15s;
    }
    .footer-links a:hover { color: var(--foreground); }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .empty-sub { color: var(--muted-foreground); font-size: 14px; }

    /* Refresh */
    .refresh-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 4px;
    }
    .refresh-timer { color: var(--muted-foreground); font-size: 12px; }

    /* Responsive table scroll */
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  </style>
</head>
<body>
  <div class="page">
    <div class="main-card">
      <!-- Header -->
      <div class="header">
        <a href="/" style="text-decoration: none;">
          <span class="logo"><span class="logo-jayce">Jayce</span><span class="logo-trades">Trades</span></span>
        </a>
        <div class="header-right">
          <a href="/" class="nav-link">Subscribe</a>
          <div class="date-nav">
            <button class="date-nav-btn" id="prevBtn" onclick="navDate(-1)" title="Previous day">&#9664;</button>
            <span class="date-nav-label" id="dateLabel">Loading...</span>
            <button class="date-nav-btn" id="nextBtn" onclick="navDate(1)" title="Next day">&#9654;</button>
          </div>
          <div class="live-dot" id="liveDot" title="Auto-refreshing"></div>
        </div>
      </div>

      <!-- Content -->
      <div class="content" id="mainContent">
        <div class="empty-state">
          <div class="empty-icon">&#9203;</div>
          <div class="empty-title">Loading trades...</div>
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <p class="footer-text">
          <strong>Disclaimer:</strong> Not financial advice. Options trading involves substantial risk. Trade responsibly.
        </p>
        <div class="footer-brand">
          <span class="logo"><span class="logo-jayce">Jayce</span><span class="logo-trades">Trades</span></span>
        </div>
        <div class="footer-links">
          <a href="/">Subscribe for free email alerts</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    var REFRESH_SECONDS = 60;
    var countdown = REFRESH_SECONDS;
    var availableDates = [];
    var currentDateIdx = 0;
    var currentData = null;

    function fmt(n, d) { return Number(n).toFixed(d === undefined ? 2 : d); }
    function fmtPct(n) { return (n > 0 ? '+' : '') + fmt(n, 0) + '%'; }
    function fmtMoney(n) { return '$' + fmt(n); }
    function fmtPnl(n) { return (n > 0 ? '+$' : n < 0 ? '-$' : '$') + fmt(Math.abs(n)); }
    function fmtPnlInt(n) { return (n > 0 ? '+$' : n < 0 ? '-$' : '$') + fmt(Math.abs(n), 0); }

    function sentimentLabel(score) {
      if (score > 0.3) return 'Bullish';
      if (score < -0.3) return 'Bearish';
      return 'Neutral';
    }
    function riskClass(level) {
      if (level === 'LOW') return 'badge-low';
      if (level === 'HIGH') return 'badge-high';
      return 'badge-medium';
    }
    function pnlColor(v) {
      if (v > 0) return 'color-green';
      if (v < 0) return 'color-red';
      return 'color-muted';
    }

    function escapeHtml(text) {
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(text));
      return d.innerHTML;
    }

    function formatDateDisplay(dateStr) {
      if (!dateStr) return 'No data';
      var parts = dateStr.split('-');
      var d = new Date(parts[0], parts[1] - 1, parts[2]);
      var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate();
    }

    // Date navigation
    function navDate(dir) {
      var newIdx = currentDateIdx + dir;
      if (newIdx < 0 || newIdx >= availableDates.length) return;
      currentDateIdx = newIdx;
      fetchData(availableDates[currentDateIdx]);
      updateNavButtons();
    }

    function updateNavButtons() {
      var prev = document.getElementById('prevBtn');
      var next = document.getElementById('nextBtn');
      // dates are newest-first, so "prev" goes to older (higher index), "next" goes to newer (lower index)
      if (next) next.disabled = currentDateIdx <= 0;
      if (prev) prev.disabled = currentDateIdx >= availableDates.length - 1;
    }

    function loadDates() {
      fetch('/api/trades/dates')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.dates && data.dates.length > 0) {
            availableDates = data.dates;
            currentDateIdx = 0;
            updateNavButtons();
          }
        });
    }

    // Toggle trade detail expansion
    function toggleDetail(idx) {
      var row = document.getElementById('detail-' + idx);
      var icon = document.getElementById('icon-' + idx);
      if (row) {
        row.classList.toggle('open');
        if (icon) icon.classList.toggle('open');
      }
    }

    function renderDashboard(data) {
      var el = document.getElementById('mainContent');
      var dateEl = document.getElementById('dateLabel');
      dateEl.textContent = formatDateDisplay(data.date);
      currentData = data;

      if (!data.trades || data.trades.length === 0) {
        el.innerHTML =
          '<div class="empty-state">' +
            '<div class="empty-icon">&#128200;</div>' +
            '<div class="empty-title">No trades for this date</div>' +
            '<div class="empty-sub">Trades are published at 9:25 AM ET on market days.</div>' +
          '</div>';
        return;
      }

      // Compute stats
      var hasSummaries = false;
      var winners = 0, losers = 0, flat = 0, totalPnl = 0;
      var bestPnl = -Infinity, worstPnl = Infinity;
      var bestSymbol = '', worstSymbol = '';
      var sortedTrades = [];

      for (var i = 0; i < data.trades.length; i++) {
        var t = data.trades[i].trade;
        var s = data.trades[i].summary;
        var pnl = 0;
        var pctChange = 0;
        if (s) {
          hasSummaries = true;
          pnl = (s.closing_price - s.entry_price) * 100;
          pctChange = s.entry_price > 0 ? ((s.closing_price - s.entry_price) / s.entry_price * 100) : 0;
          totalPnl += pnl;
          if (pnl > 0.5) winners++;
          else if (pnl < -0.5) losers++;
          else flat++;
          if (pnl > bestPnl) { bestPnl = pnl; bestSymbol = t.symbol; }
          if (pnl < worstPnl) { worstPnl = pnl; worstSymbol = t.symbol; }
        }
        sortedTrades.push({ trade: t, summary: s, pnl: pnl, pctChange: pctChange, idx: i });
      }

      var totalTrades = data.trades.length;
      var winRate = (winners + losers) > 0 ? (winners / (winners + losers) * 100) : 0;

      var html = '';

      // Refresh bar
      html += '<div class="refresh-bar">' +
        '<div><h1 style="font-size: 20px; font-weight: 800; letter-spacing: -0.5px;">' +
        (hasSummaries ? 'End of Day Results' : "Today's Plays") + '</h1></div>' +
        '<span class="refresh-timer" id="timer">Refreshes in ' + REFRESH_SECONDS + 's</span>' +
      '</div>';
      html += '<p style="color: var(--muted-foreground); font-size: 13px; margin-bottom: 20px;">' +
        totalTrades + ' options picks' +
        (hasSummaries ? '' : ' &middot; 0-7 DTE &middot; Under $200/contract') + '</p>';

      if (hasSummaries) {
        // Stats Grid
        var pnlClass = totalPnl > 0 ? 'color-green' : totalPnl < 0 ? 'color-red' : 'color-muted';
        html += '<div class="stats-grid">';

        // Net P&L
        html += '<div class="stat-card">' +
          '<div class="stat-value ' + pnlClass + '">' + fmtPnlInt(totalPnl) + '</div>' +
          '<div class="stat-label">Net P&amp;L</div>' +
        '</div>';

        // Win Rate
        html += '<div class="stat-card">' +
          '<div class="stat-value">' + fmt(winRate, 0) + '%</div>' +
          '<div class="stat-label">Win Rate</div>' +
          '<div class="win-bar-container"><div class="win-bar-fill" style="width: ' + winRate + '%;"></div></div>' +
        '</div>';

        // Best Trade
        html += '<div class="stat-card">' +
          '<div class="stat-value color-green" style="font-size: 22px;">' + fmtPnlInt(bestPnl) + '</div>' +
          '<div class="stat-label">Best Trade</div>' +
          '<div class="stat-sub">$' + bestSymbol + '</div>' +
        '</div>';

        // Worst Trade
        html += '<div class="stat-card">' +
          '<div class="stat-value color-red" style="font-size: 22px;">' + fmtPnlInt(worstPnl) + '</div>' +
          '<div class="stat-label">Worst Trade</div>' +
          '<div class="stat-sub">$' + worstSymbol + '</div>' +
        '</div>';

        html += '</div>'; // stats-grid

        // P&L Bar Chart
        html += '<div class="section-header">' +
          '<div class="section-title">P&amp;L by Trade</div>' +
          '<div class="section-subtitle">Sorted by performance</div>' +
        '</div>';

        // Sort trades by P&L descending for the chart
        var chartTrades = sortedTrades.slice().sort(function(a, b) { return b.pnl - a.pnl; });
        var maxAbsPnl = 0;
        for (var i = 0; i < chartTrades.length; i++) {
          var absPnl = Math.abs(chartTrades[i].pnl);
          if (absPnl > maxAbsPnl) maxAbsPnl = absPnl;
        }
        if (maxAbsPnl === 0) maxAbsPnl = 1;

        html += '<div class="chart-container">';
        for (var i = 0; i < chartTrades.length; i++) {
          var ct = chartTrades[i];
          var barWidth = Math.max(2, Math.abs(ct.pnl) / maxAbsPnl * 100);
          var barClass = ct.pnl >= 0 ? 'chart-bar-profit' : 'chart-bar-loss';
          var typeClass = ct.trade.contract_type === 'CALL' ? 'chart-type-call' : 'chart-type-put';

          html += '<div class="chart-row">' +
            '<div class="chart-label">' +
              '<span class="chart-symbol">$' + ct.trade.symbol + '</span>' +
              '<span class="chart-type ' + typeClass + '">' + ct.trade.contract_type + '</span>' +
            '</div>' +
            '<div class="chart-bar-wrapper">' +
              '<div class="chart-bar ' + barClass + '" style="width: ' + barWidth + '%;"></div>' +
            '</div>' +
            '<div class="chart-pnl">' +
              '<span class="' + pnlColor(ct.pnl) + '">' + fmtPnlInt(ct.pnl) + '</span>' +
              '<span class="chart-pnl-pct ' + pnlColor(ct.pctChange) + '">' + fmtPct(ct.pctChange) + '</span>' +
            '</div>' +
          '</div>';
        }
        html += '</div>';

        html += '<div class="divider"></div>';

        // Trade Details Table
        html += '<div class="section-header">' +
          '<div class="section-title">Trade Details</div>' +
          '<div class="section-subtitle">Click to expand</div>' +
        '</div>';

        html += '<div class="table-scroll"><table class="trade-table">';
        html += '<thead><tr>' +
          '<th style="width: 30px;">#</th>' +
          '<th>Trade</th>' +
          '<th>Entry</th>' +
          '<th>Close</th>' +
          '<th>Stock</th>' +
          '<th>P&amp;L</th>' +
        '</tr></thead><tbody>';

        for (var i = 0; i < data.trades.length; i++) {
          var t = data.trades[i].trade;
          var s = data.trades[i].summary;
          var pnl = s ? (s.closing_price - s.entry_price) * 100 : 0;
          var pct = (s && s.entry_price > 0) ? ((s.closing_price - s.entry_price) / s.entry_price * 100) : 0;
          var stockPct = (s && s.stock_open > 0) ? ((s.stock_close - s.stock_open) / s.stock_open * 100) : 0;
          var typeClass = t.contract_type === 'CALL' ? 'badge-call' : 'badge-put';
          var resultBadge = '';
          if (s) {
            var res = pnl > 0.5 ? 'PROFIT' : pnl < -0.5 ? 'LOSS' : 'FLAT';
            var resClass = res === 'PROFIT' ? 'badge-profit' : res === 'LOSS' ? 'badge-loss' : 'badge-flat';
            resultBadge = ' <span class="badge ' + resClass + '" style="font-size: 9px; padding: 2px 5px;">' + res + '</span>';
          }

          // Main row
          html += '<tr class="clickable" onclick="toggleDetail(' + i + ')">' +
            '<td><span class="expand-icon" id="icon-' + i + '">&#9654;</span>' + (i + 1) + '</td>' +
            '<td>' +
              '<span class="trade-table-symbol">$' + t.symbol + '</span> ' +
              '<span class="badge ' + typeClass + '" style="font-size: 9px; padding: 2px 5px;">' + t.contract_type + '</span>' +
              resultBadge +
              '<div class="trade-table-detail">$' + fmt(t.strike_price, 0) + ' ' + t.expiration + ' &middot; ' + t.dte + ' DTE</div>' +
            '</td>' +
            '<td>' + fmtMoney(s ? s.entry_price : t.estimated_price) + '</td>' +
            '<td>' + (s ? fmtMoney(s.closing_price) : '&mdash;') + '</td>' +
            '<td>' + (s ? '<span class="' + pnlColor(stockPct) + '">' + fmtPct(stockPct) + '</span>' : fmtMoney(t.current_price)) + '</td>' +
            '<td><span class="' + pnlColor(pnl) + '" style="font-weight: 800;">' + (s ? fmtPnlInt(pnl) : '&mdash;') + '</span>' +
              (s ? '<div class="trade-table-detail ' + pnlColor(pct) + '">' + fmtPct(pct) + '</div>' : '') +
            '</td>' +
          '</tr>';

          // Expandable detail row
          html += '<tr class="trade-detail-row" id="detail-' + i + '">' +
            '<td colspan="6" class="trade-detail-cell">' +
              '<div class="trade-detail-inner">';

          // Detail grid
          html += '<div class="detail-grid">' +
            '<div class="detail-col">' +
              '<div class="detail-label">Strike</div>' +
              '<div class="detail-value">$' + fmt(t.strike_price, 0) + '</div>' +
            '</div>' +
            '<div class="detail-col">' +
              '<div class="detail-label">Expiration</div>' +
              '<div class="detail-value-sm">' + t.expiration + '</div>' +
            '</div>' +
            '<div class="detail-col">' +
              '<div class="detail-label">Stock Price</div>' +
              '<div class="detail-value">$' + fmt(t.current_price, 2) + '</div>' +
            '</div>' +
            '<div class="detail-col">' +
              '<div class="detail-label">Target</div>' +
              '<div class="detail-value color-green">$' + fmt(t.target_price, 2) + '</div>' +
            '</div>' +
            '<div class="detail-col">' +
              '<div class="detail-label">Risk</div>' +
              '<div style="margin-top: 2px;"><span class="badge ' + riskClass(t.risk_level) + '">' + t.risk_level + '</span></div>' +
            '</div>' +
            '<div class="detail-col">' +
              '<div class="detail-label">Sentiment</div>' +
              '<div style="margin-top: 2px;">' + sentimentLabel(t.sentiment_score) +
              (t.mention_count > 0 ? ' &middot; ' + t.mention_count + ' mentions' : '') + '</div>' +
            '</div>' +
          '</div>';

          if (t.catalyst) {
            html += '<div style="font-size: 12px; color: var(--muted-foreground); margin-bottom: 4px;">' +
              '<strong>Catalyst:</strong> ' + escapeHtml(t.catalyst) + '</div>';
          }

          // EOD result
          if (s) {
            var eodClass = pnl > 0.5 ? 'profit' : pnl < -0.5 ? 'loss' : '';
            html += '<div class="detail-eod ' + eodClass + '">' +
              '<div class="detail-grid">' +
                '<div class="detail-col">' +
                  '<div class="detail-label">Contract</div>' +
                  '<div style="margin-top: 4px;">' +
                    '<span style="color: var(--muted-foreground); font-size: 13px;">' + fmtMoney(s.entry_price) + '</span>' +
                    ' <span style="color: var(--accent);">&#8594;</span> ' +
                    '<span style="font-weight: 700;">' + fmtMoney(s.closing_price) + '</span>' +
                    ' <span class="' + pnlColor(pct) + '" style="font-size: 11px; font-weight: 700;">' + fmtPct(pct) + '</span>' +
                  '</div>' +
                '</div>' +
                '<div class="detail-col">' +
                  '<div class="detail-label">Stock Movement</div>' +
                  '<div style="margin-top: 4px;">' +
                    '<span style="color: var(--muted-foreground); font-size: 13px;">' + fmtMoney(s.stock_open) + '</span>' +
                    ' <span style="color: var(--accent);">&#8594;</span> ' +
                    '<span style="font-weight: 700;">' + fmtMoney(s.stock_close) + '</span>' +
                    ' <span class="' + pnlColor(stockPct) + '" style="font-size: 11px; font-weight: 700;">' + fmtPct(stockPct) + '</span>' +
                  '</div>' +
                '</div>' +
              '</div>';
            if (s.notes) {
              html += '<div class="detail-eod-notes">' + escapeHtml(s.notes) + '</div>';
            }
            html += '</div>';
          }

          // Thesis
          if (t.thesis) {
            html += '<div class="detail-thesis">' + escapeHtml(t.thesis) + '</div>';
          }

          html += '</div></td></tr>';
        }

        html += '</tbody></table></div>';

      } else {
        // Morning only - no EOD data yet
        html += '<div class="info-banner">' +
          '<span class="info-banner-icon">&#9202;</span>' +
          '<span class="info-banner-text">End-of-day results will be available after 4:05 PM ET.</span>' +
        '</div>';

        // Morning trade cards
        for (var i = 0; i < data.trades.length; i++) {
          var t = data.trades[i].trade;
          var typeClass = t.contract_type === 'CALL' ? 'badge-call' : 'badge-put';
          var profitPct = t.estimated_price > 0 ? ((t.profit_target - t.estimated_price) / t.estimated_price * 100) : 0;

          html += '<div class="morning-card">';

          // Header
          html += '<div class="morning-header">' +
            '<div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">' +
              '<span style="width: 26px; height: 26px; border-radius: 6px; background: var(--primary); color: var(--primary-foreground); font-size: 12px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center;">' + (i + 1) + '</span>' +
              '<span class="morning-symbol">$' + t.symbol + '</span>' +
              '<span class="badge ' + typeClass + '">' + t.contract_type + '</span>' +
              '<span class="badge ' + riskClass(t.risk_level) + '">' + t.risk_level + '</span>' +
            '</div>' +
            '<div class="morning-price">' + fmtMoney(t.estimated_price) + '<span style="font-size: 11px; color: var(--muted-foreground); font-weight: 500; margin-left: 4px;">($' + fmt(t.estimated_price * 100, 0) + '/contract)</span></div>' +
          '</div>';

          // Specs
          html += '<div class="morning-specs">' +
            '<span><strong>$' + fmt(t.strike_price, 0) + '</strong> strike</span>' +
            '<span>' + t.expiration + ' <strong>(' + t.dte + ' DTE)</strong></span>' +
            '<span>Stock: <strong>$' + fmt(t.current_price, 2) + '</strong></span>' +
            '<span>Target: <strong style="color: var(--green);">$' + fmt(t.target_price, 2) + '</strong></span>' +
            '<span>Profit: <strong style="color: var(--green);">' + fmtMoney(t.profit_target) + ' (+' + fmt(profitPct, 0) + '%)</strong></span>' +
          '</div>';

          // Sentiment + Catalyst
          if (t.catalyst || t.sentiment_score !== 0) {
            html += '<div style="margin-top: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 12px; color: var(--muted-foreground);">';
            html += '<span>' + sentimentLabel(t.sentiment_score) + '</span>';
            if (t.mention_count > 0) html += '<span>' + t.mention_count + ' WSB mentions</span>';
            if (t.catalyst) html += '<span>' + escapeHtml(t.catalyst) + '</span>';
            html += '</div>';
          }

          // Thesis
          if (t.thesis) {
            html += '<div class="morning-thesis">' + escapeHtml(t.thesis) + '</div>';
          }

          html += '</div>';
        }
      }

      el.innerHTML = html;
    }

    function fetchData(date) {
      var url = '/api/trades/today';
      if (date) url += '?date=' + date;

      fetch(url)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          renderDashboard(data);
          countdown = REFRESH_SECONDS;
          // Update date index if we loaded latest
          if (!date && data.date && availableDates.length > 0) {
            var idx = availableDates.indexOf(data.date);
            if (idx >= 0) currentDateIdx = idx;
            updateNavButtons();
          }
        })
        .catch(function() {
          countdown = REFRESH_SECONDS;
        });
    }

    function tick() {
      countdown--;
      var timerEl = document.getElementById('timer');
      if (timerEl) timerEl.textContent = 'Refreshes in ' + countdown + 's';
      if (countdown <= 0) fetchData(availableDates[currentDateIdx] || null);
    }

    loadDates();
    fetchData();
    setInterval(tick, 1000);
  </script>
</body>
</html>
