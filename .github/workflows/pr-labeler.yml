name: PR Labeler

# Auto-tags PRs based on which paths the diff touches. Pure
# quality-of-life — makes the PR list scannable and useful for
# retrospectives. Config lives in .github/labeler.yml.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: PR Labeler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
