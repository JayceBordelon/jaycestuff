name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deployment
  cancel-in-progress: false

env:
  PROJECT_PATH: /home/jayce/personal-monorepo
  REPO_URL: git@github.com:JayceBordelon/personal-monorepo.git

jobs:
  sync:
    name: Sync
    uses: ./.github/workflows/sync.yml
    secrets: inherit
    with:
      project_path: /home/jayce/personal-monorepo
      repo_url: git@github.com:JayceBordelon/personal-monorepo.git

  lint:
    name: Lint
    needs: sync
    if: success()
    uses: ./.github/workflows/lint.yml
    secrets: inherit
    with:
      project_path: /home/jayce/personal-monorepo

  # ── Build (parallel) ──────────────────────────────────────────────

  build_portfolio:
    name: Build / Portfolio
    needs: sync
    if: success()
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      project_path: /home/jayce/personal-monorepo
      service: jaycebordelon-com

  build_frontend:
    name: Build / Trading Frontend
    needs: sync
    if: success()
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      project_path: /home/jayce/personal-monorepo
      service: trading-frontend

  build_server:
    name: Build / Trading Server
    needs: sync
    if: success()
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      project_path: /home/jayce/personal-monorepo
      service: trading-server

  # ── Deploy (independent) ──────────────────────────────────────────

  deploy_portfolio:
    name: Deploy / Portfolio
    needs: build_portfolio
    if: success()
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      project_path: /home/jayce/personal-monorepo
      service: portfolio

  deploy_trading:
    name: Deploy / Trading
    needs: [build_frontend, build_server]
    if: success()
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      project_path: /home/jayce/personal-monorepo
      service: trading

  # ── Notify (fires as soon as its deploy finishes) ─────────────────

  notify_portfolio:
    name: Notify / Portfolio
    needs: deploy_portfolio
    if: always() && !cancelled()
    uses: ./.github/workflows/notify-portfolio.yml
    secrets: inherit
    with:
      deploy_status: ${{ needs.deploy_portfolio.result == 'success' && needs.deploy_portfolio.outputs.status || '✗ FAILED' }}
      deploy_error: ${{ needs.deploy_portfolio.outputs.error || 'Deploy did not run' }}
      commit_sha: ${{ needs.deploy_portfolio.outputs.commit_sha || github.sha }}
      short_sha: ${{ needs.deploy_portfolio.outputs.short_sha || 'unknown' }}
      commit_message: ${{ needs.deploy_portfolio.outputs.commit_message || 'No message' }}
      commit_author: ${{ needs.deploy_portfolio.outputs.commit_author || github.actor }}
      commit_timestamp: ${{ needs.deploy_portfolio.outputs.commit_timestamp || 'Unknown' }}

  notify_trading:
    name: Notify / Trading
    needs: deploy_trading
    if: always() && !cancelled()
    uses: ./.github/workflows/notify-trading.yml
    secrets: inherit
    with:
      service: vibetradez.com
      service_url: https://vibetradez.com
      deploy_status: ${{ needs.deploy_trading.result == 'success' && needs.deploy_trading.outputs.status || '✗ FAILED' }}
      deploy_error: ${{ needs.deploy_trading.outputs.error || 'Deploy did not run' }}
      commit_sha: ${{ needs.deploy_trading.outputs.commit_sha || github.sha }}
      short_sha: ${{ needs.deploy_trading.outputs.short_sha || 'unknown' }}
      commit_message: ${{ needs.deploy_trading.outputs.commit_message || 'No message' }}
      commit_author: ${{ needs.deploy_trading.outputs.commit_author || github.actor }}
      commit_timestamp: ${{ needs.deploy_trading.outputs.commit_timestamp || 'Unknown' }}

  # ── Post-deploy (waits for both) ──────────────────────────────────

  cleanup:
    name: Cleanup
    needs: [deploy_portfolio, deploy_trading]
    if: success()
    uses: ./.github/workflows/cleanup.yml
    secrets: inherit
    with:
      project_path: /home/jayce/personal-monorepo

  healthcheck:
    name: Health Check
    needs: [deploy_portfolio, deploy_trading]
    if: success()
    uses: ./.github/workflows/healthcheck.yml
    secrets: inherit
